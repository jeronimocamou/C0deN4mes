<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blueglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#0a0a0a"/>

  <!-- Red ambient left -->
  <ellipse cx="28" cy="44" rx="22" ry="20" fill="rgba(239,68,68,0.15)"/>
  <!-- Blue ambient right -->
  <ellipse cx="72" cy="44" rx="22" ry="20" fill="rgba(59,130,246,0.15)"/>

  <!-- Cranium -->
  <ellipse cx="50" cy="42" rx="29" ry="27" fill="#e5e5e5"/>

  <!-- Jaw -->
  <rect x="29" y="59" width="42" height="17" rx="5" fill="#e5e5e5"/>

  <!-- Left eye socket -->
  <ellipse cx="37" cy="43" rx="9" ry="10" fill="#0a0a0a"/>
  <!-- Left eye glow (red) -->
  <ellipse cx="37" cy="43" rx="5" ry="5.5" fill="rgba(239,68,68,0.9)" filter="url(#redglow)"/>

  <!-- Right eye socket -->
  <ellipse cx="63" cy="43" rx="9" ry="10" fill="#0a0a0a"/>
  <!-- Right eye glow (blue) -->
  <ellipse cx="63" cy="43" rx="5" ry="5.5" fill="rgba(59,130,246,0.9)" filter="url(#blueglow)"/>

  <!-- Nose cavity -->
  <path d="M46 55 L50 49 L54 55 Z" fill="#0a0a0a"/>

  <!-- Teeth gaps -->
  <rect x="30" y="61" width="8" height="10" rx="2" fill="#0a0a0a"/>
  <rect x="42" y="61" width="8" height="10" rx="2" fill="#0a0a0a"/>
  <rect x="54" y="61" width="8" height="10" rx="2" fill="#0a0a0a"/>
  <rect x="66" y="61" width="5" height="10" rx="2" fill="#0a0a0a"/>
</svg>
